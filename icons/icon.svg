  <rect x="182" y="278" width="58" height="46" rx="9" fill="#FFFFFF" fill-opacity="0.25"/>
  <rect x="252" y="278" width="58" height="46" rx="9" fill="#FFFFFF" fill-opacity="0.25"/>
